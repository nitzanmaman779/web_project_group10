<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wineder - My Cellar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylecellar.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="Wineder Logo" width="50" height="50" class="me-2">
                <span class="brand-name" style="font-family: 'Playfair Display', serif; font-weight: 700; color: #B76E79; letter-spacing: 2px;">WINEDER</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="checkAccess(event, 'arena.html')">The Arena</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="checkAccess(event, 'cellar.html')">My Cellar</a></li>
                </ul>



                
                <div id="userArea" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="custom-modal-content text-center">
            <h3 style="color: #C68E58; font-family: 'Playfair Display', serif;">Login Required</h3>
            <p>Please log in to access this page.</p>
            <div class="d-grid gap-2">
                <button class="btn btn-rose" onclick="window.location.href='login.html'">Go to Login</button>
                <button class="btn btn-link text-muted" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div class="cellar-container" style="margin-top: 30px;">
                
        <div class="cellar-header">
            <h1 id="cellar-title">My Cellar</h1>
            <p>Your personal wine collection</p>
            
            <div class="cellar-toolbar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by name...">
                </div>

                <div class="filter-dropdowns">
                    <div class="dropdown">
                        <button class="chip dropdown-toggle" data-bs-toggle="dropdown" id="wineryBtn">Winery</button>
                        <ul class="dropdown-menu" id="wineryDropdown">
                            <li><a class="dropdown-item" href="#" data-value="all">All Wineries</a></li>
                        </ul>
                    </div>
                    
                    <div class="dropdown">
                        <button class="chip dropdown-toggle" data-bs-toggle="dropdown" id="yearBtn">Year</button>
                        <ul class="dropdown-menu" id="yearDropdown">
                            <li><a class="dropdown-item" href="#" data-value="all">All Years</a></li>
                        </ul>
                    </div>
                </div>

                <div class="filter-chips">
                    <button class="chip active" data-type="all">All</button>
                    <button class="chip" data-type="red">Red</button>
                    <button class="chip" data-type="white">White</button>
                    <button class="chip" data-type="rose">Rose</button>
                </div>
            </div>
            
            <div class="d-flex justify-content-center gap-3">
                <button class="btn-back" onclick="window.location.href='arena.html'">Back to Arena</button>
                <button class="btn-add-wine" onclick="showAddWineModal()">+ Add New Wine</button>
            </div>
        </div>

        <div class="empty-state" id="empty-state">
            <h2>Your cellar is empty!</h2>
            <p>Go to the Swipe Arena to find some great wines to add here.</p>
            <button class="btn-action" onclick="window.location.href='arena.html'">Find Wines</button>
        </div>
        
        <div class="cellar-grid" id="cellar-grid"></div>

        <div id="addWineModal" class="modal-overlay" style="display: none;">
            <div class="custom-modal-content">
                <h3 style="color: #C68E58; font-family: 'Playfair Display', serif; text-align: center;" class="mb-3">Add Wine to Cellar</h3>
                
                <form id="addWineForm" onsubmit="saveNewWine(event)">
                    
                    <div class="mb-2 text-start">
                        <label class="small text-muted fw-bold">WINE NAME *</label>
                        <input type="text" id="newWineName" class="form-control" required placeholder="e.g., Cabernet Sauvignon" pattern="^[A-Za-z0-9\s\-,.'&]+$" title="Please use English characters only">
                    </div>

                    <div class="mb-2 text-start">
                        <label class="small text-muted fw-bold">WINERY *</label>
                        <input type="text" id="newWineWinery" class="form-control" required placeholder="e.g., Chateau Margaux" pattern="^[A-Za-z0-9\s\-,.'&]+$" title="Please use English characters only">
                    </div>

                    <div class="mb-2 text-start">
                        <label class="small text-muted fw-bold">YEAR *</label>
                        <input type="number" id="newWineYear" class="form-control" required min="1800" max="2026" placeholder="e.g., 2021" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);">
                    </div>

                    <div class="mb-2 text-start">
                        <label class="small text-muted fw-bold">WINE TYPE *</label>
                        <select id="newWineType" class="form-control" required>
                            <option value="Red">Red</option>
                            <option value="White">White</option>
                            <option value="Rose">Rose</option>
                        </select>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="small text-muted fw-bold">WINE IMAGE URL (OPTIONAL)</label>
                        <input type="text" id="newWineImage" class="form-control" placeholder="Paste an image link from the web...">
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-rose">Add to My Cellar</button>
                        <button type="button" class="btn btn-link text-muted" onclick="closeAddWineModal()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scriptlogin.js"></script>
    <script src="scriptcellar.js"></script>
</body>
</html>
