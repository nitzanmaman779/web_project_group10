<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wineder - Swipe Arena</title>
    
     <!-- ספריות עיצוב חיצוניות -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- קבצי העיצוב של האתר -->
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="stylearena.css">
</head>
<body>
    <!-- תפריט הניווט -->
    <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <img src="images/logo.png" alt="Wineder Logo" width="50" height="50" class="me-2">
                    <span class="brand-name" style="font-family: 'Playfair Display', serif; font-weight: 700; color: #B76E79; letter-spacing: 2px;">WINEDER</span>
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- קישורי ניווט באתר -->
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="#" onclick="checkAccess(event, 'arena.html')">The Arena</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="checkAccess(event, 'cellar.html')">My Cellar</a></li>
                    </ul>
                    
                     <!-- אזור המשתמש לאחר התחברות -->
                    <div id="userArea" class="d-flex align-items-center"></div>
                </div>
            </div>
        </nav>

        <!-- חלונית דרישות התחברות -->
        <div id="loginModal" class="modal-overlay" style="display: none;">
            <div class="custom-modal-content text-center">
                <h3 style="color: #C68E58; font-family: 'Playfair Display', serif;">Login Required</h3>
                <p>Please log in to access this page.</p>
                <div class="d-grid gap-2">
                    <button class="btn btn-rose" onclick="window.location.href='login.html'">Go to Login</button>
                    <button class="btn btn-link text-muted" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>

    <!-- איזור ההחלקה -->
    <div class="arena-wrapper">
        <div class="arena-container">
            <div class="arena-header">
                <p>Find your perfect match</p>
            </div>

            <div class="card-area" id="card-area">
                <div class="wine-card" id="wine-card">
                    <img src="" alt="Wine Image" id="wine-img" class="wine-img">
                    <div class="wine-info">
                        <h2 id="wine-name">Wine Name</h2>
                        <h3 id="wine-winery-year">Winery | Year</h3>
                        <p id="wine-desc">Description...</p>
                        <div class="wine-tags" id="wine-tags"></div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action btn-dislike" id="btn-dislike">❌</button>
                        <button class="btn-action btn-like" id="btn-like">❤️</button>
                    </div>
                </div>
            </div>

            <!-- מצב סיום כשאין עוד המלצות -->
            <div class="empty-state" id="empty-state">
                <h2>That's it for today!</h2>
                <p>You've seen all our recommendations based on your taste.</p>
                <button class="btn-cellar" onclick="window.location.href='cellar.html'">Go to My Cellar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scriptlogin.js"></script>
    <script src="scriptarena.js"></script>
</body>
</html>
