<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wineder - Login & Sign Up</title>

    <!-- ספריות עיצוב חיצוניות -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
     <!-- קבצי העיצוב של האתר -->
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="stylelogin.css"> 
</head>
<body>

    <!-- תפריט הניווט -->
    <nav class="navbar navbar-expand-lg sticky-top w-100 position-absolute top-0">
        <div class="container">
             <!-- לוגו ושם האתר -->
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logo.png" alt="Wineder Logo" width="50" height="50" class="me-2">
                <span class="brand-name" style="font-family: 'Playfair Display', serif; font-weight: 700; color: #B76E79; letter-spacing: 2px;">WINEDER</span>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- קישורי ניווט באתר -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="checkAccess(event, 'arena.html')">The Arena</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="checkAccess(event, 'cellar.html')">My Cellar</a></li>
                </ul>

                <!-- אזור המשתמש לאחר התחברות -->
                <div id="userArea" class="d-flex align-items-center"></div>
            </div>
        </div>
    </nav>

    <!-- אזור ההתחברות וההרשמה -->
     <div class="auth-container" style="margin-top: 80px;">
        <div class="auth-header">
            <h1>Wineder</h1>
            <p>Swipe. Match. Sip.</p>
        </div>

        <div class="auth-card">
            <!-- מעבר בין התחברות להרשמה -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login">Login</button>
                <button class="tab-btn" id="tab-signup">Sign Up</button>
            </div>

            <!-- טופס התחברות -->
            <form id="login-form" class="form-section active" onsubmit="event.preventDefault();">
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <!-- טופס הרשמה לאתר -->
            <form id="signup-form" class="form-section" onsubmit="event.preventDefault();">
                <h2>Create Account</h2>
                
                <!-- פרטים אישיים בסיסיים -->
                <div class="form-step">
                    <h3>1. Basic Information</h3>
                    <div class="input-row">
                        <div class="input-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" placeholder="John" required>
                        </div>
                        <div class="input-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="john@example.com" required>
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password" required minlength="6">
                    </div>
                </div>

                 <!-- אימות גיל המשתמש -->
                <div class="form-step">
                    <h3>2. Age Verification</h3>
                    <div class="checkbox-group">
                        <input type="checkbox" id="age-check" required>
                        <label for="age-check">I confirm that I am over 18 years old.</label>
                    </div>
                </div>

                <!-- שאלות העדפות אישי לכל משתמש -->
                <div class="form-step">
                    <h3>3. Taste Preferences</h3>
                    <!-- בחירת צבעי יין מועדפים -->
                    <p class="question-title">Preferred Wine Color (Choose up to 2 or All):</p>
                    <div class="bubble-group">
                        <input type="checkbox" id="color-red" name="wine-color" value="red">
                        <label class="bubble-label" for="color-red">Red</label>

                        <input type="checkbox" id="color-white" name="wine-color" value="white">
                        <label class="bubble-label" for="color-white">White</label>

                        <input type="checkbox" id="color-rose" name="wine-color" value="rose">
                        <label class="bubble-label" for="color-rose">Rosé</label>
                        
                        <input type="checkbox" id="color-all" name="wine-color" value="all">
                        <label class="bubble-label" for="color-all">All</label>
                    </div>

                    <!-- בחירת רמת מתיקות מועדפת -->
                    <p class="question-title">Sweetness Level (Choose up to 2 or All):</p>
                    <div class="bubble-group">
                        <input type="checkbox" id="sweet-dry" name="sweetness" value="dry">
                        <label class="bubble-label" for="sweet-dry">Dry</label>

                        <input type="checkbox" id="sweet-semi" name="sweetness" value="semi-dry">
                        <label class="bubble-label" for="sweet-semi">Semi-Dry</label>

                        <input type="checkbox" id="sweet-sweet" name="sweetness" value="sweet">
                        <label class="bubble-label" for="sweet-sweet">Sweet</label>

                        <input type="checkbox" id="sweet-all" name="sweetness" value="all">
                        <label class="bubble-label" for="sweet-all">All</label>
                    </div>


                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>
    </div>

     <!-- הודעת הצלחה לאחר התחברות או הרשמה -->
    <div id="successModal" class="modal-overlay" style="display: none;">
        <div class="custom-modal-content text-center">
            <!-- אנימציית כוסות -->
            <div class="cheers-animation">
                <i class="fas fa-glass-cheers left-glass"></i>
                <i class="fas fa-glass-cheers right-glass"></i>
            </div>
            
            <h3 id="successTitle" style="color: #C68E58; font-family: 'Playfair Display', serif; font-weight: 700;">Cheers!</h3>
            <p id="successMessage" style="font-weight: 600; color: #333; margin-bottom: 20px;">Welcome back!</p>
            
            <div class="d-grid gap-2">
                <button class="btn btn-rose" onclick="redirectToindex()">Let's Start</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scriptlogin.js"></script>
</body>
</html>
